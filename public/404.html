<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Single Page Apps for GitHub Pages
        // MIT License
        // https://github.com/rafgraph/spa-github-pages
        // This script checks the current URL and redirects to the index.html with the correct path
        (function() {
            var segmentCount = 0;
            var l = window.location;
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
                l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
                (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        })();
    </script>
</head>
<body>
    <noscript>
        <h1>Page Not Found</h1>
        <p>If you're seeing this message, that means you have JavaScript disabled. Please enable JavaScript to use this application.</p>
        <p>Alternatively, you can <a href="/Zhangpeng_Website/">go back to the homepage</a>.</p>
    </noscript>
</body>
</html>
